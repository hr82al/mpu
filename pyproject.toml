# ─── mpuapi-* — sl-back HTTP API клиенты (см. src/mpu/commands/_mpuapi_spec.py) ─────────
# Все ссылаются на один runtime-модуль; токен кешируется на 10 мин в
# ~/.config/mpu/.api-token.json. Список регенерируется из COMMANDS:
#   uv run python -c 'from mpu.commands._mpuapi_spec import COMMANDS; \
#     [print(f"mpuapi-{c.name} = \"mpu.commands._mpuapi_runtime:run_{c.name.replace(\"-\",\"_\")}\"") for c in COMMANDS]'
