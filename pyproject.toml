[project]
name = "mpu"
version = "0.1.0"
description = "Monorepo Python utilities — multi-purpose CLI for ad-hoc operations"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "httpx>=0.27",
]

