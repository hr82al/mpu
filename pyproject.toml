[project]
name = "mpu"
version = "0.1.0"
description = "Monorepo Python utilities — multi-purpose CLI for ad-hoc operations"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "httpx>=0.27",
]

[project.scripts]
mpu = "mpu.cli:app"
mpu-search = "mpu.commands.search:run"
mpu-update = "mpu.commands.update:run"
mpu-sql = "mpu.commands.sql:run"
mpu-backup-wb-unit-proto = "mpu.commands.backup_wb_unit_proto:run"
mpu-backup-ozon-unit-proto = "mpu.commands.backup_ozon_unit_proto:run"
mpu-wb-recalculate-expenses = "mpu.commands.recalculate_wb_expenses:run"
mpu-wb-save-expenses = "mpu.commands.save_wb_expenses:run"
mpu-process = "mpu.commands.process:run"
mpu-ss-update = "mpu.commands.ss_update:run"
mpu-ss-load = "mpu.commands.ss_load:run"
mpu-ss-datasets = "mpu.commands.ss_datasets:run"
mpu-wb-loader = "mpu.commands.wb_loader:run"
mpu-wb-jobs = "mpu.commands.wb_jobs:run"
mpu-wb-unit-calc = "mpu.commands.wb_unit_calc:run"
mpu-wb-unit-proto-new = "mpu.commands.wb_unit_proto_new:run"
mpu-iu-wb = "mpu.commands.iu_wb:run"
mpu-ozon-loader = "mpu.commands.ozon_loader:run"
mpu-ozon-jobs = "mpu.commands.ozon_jobs:run"
mpu-ozon-recalculate-expenses = "mpu.commands.recalculate_ozon_expenses:run"
mpu-ozon-save-expenses = "mpu.commands.save_ozon_expenses:run"
mpu-clients-migrations = "mpu.commands.clients_migrations:run"
mpu-datasets-migrations = "mpu.commands.datasets_migrations:run"
mpu-app-migrations = "mpu.commands.app_migrations:run"
mpu-users = "mpu.commands.users:run"
mpu-data-loader = "mpu.commands.data_loader:run"
mpu-data-loader-jobs = "mpu.commands.data_loader_jobs:run"
mpu-d2-miro = "mpu.commands.d2_miro:run"
mpu-run-js = "mpu.commands.run_js:run"
mpup-ssh = "mpu.commands.pssh:run"
mpup-ps = "mpu.commands.ps:run"
mpup-logs = "mpu.commands.logs:run"
mpup-health = "mpu.commands.health:run"
mpu-help = "mpu.commands.help:run"

# `mpup-*` — параллельные bin'ы к `mpu-*` cli_wrap-командам. Печатают
# `mpup-ssh <selector> --no-stdin -- node ...` вместо ssh+docker обёртки.
# Реализованы через env-override `MPU_WRAPPER=portainer` (см. `mpu.lib.cli_wrap`)
# — typer-команды и резолв параметров общие с `mpu-*`.
mpup-data-loader = "mpu.commands.data_loader:run_portainer"
mpup-data-loader-jobs = "mpu.commands.data_loader_jobs:run_portainer"
mpup-users = "mpu.commands.users:run_portainer"
mpup-iu-wb = "mpu.commands.iu_wb:run_portainer"
mpup-ss-datasets = "mpu.commands.ss_datasets:run_portainer"
mpup-ss-load = "mpu.commands.ss_load:run_portainer"
mpup-ss-update = "mpu.commands.ss_update:run_portainer"
mpup-ozon-loader = "mpu.commands.ozon_loader:run_portainer"
mpup-ozon-jobs = "mpu.commands.ozon_jobs:run_portainer"
mpup-wb-loader = "mpu.commands.wb_loader:run_portainer"
mpup-wb-jobs = "mpu.commands.wb_jobs:run_portainer"
mpup-wb-unit-calc = "mpu.commands.wb_unit_calc:run_portainer"
mpup-wb-unit-proto-new = "mpu.commands.wb_unit_proto_new:run_portainer"
mpup-clients-migrations = "mpu.commands.clients_migrations:run_portainer"
mpup-datasets-migrations = "mpu.commands.datasets_migrations:run_portainer"
mpup-app-migrations = "mpu.commands.app_migrations:run_portainer"
mpup-process = "mpu.commands.process:run_portainer"
mpup-wb-save-expenses = "mpu.commands.save_wb_expenses:run_portainer"
mpup-ozon-save-expenses = "mpu.commands.save_ozon_expenses:run_portainer"
mpup-wb-recalculate-expenses = "mpu.commands.recalculate_wb_expenses:run_portainer"
mpup-ozon-recalculate-expenses = "mpu.commands.recalculate_ozon_expenses:run_portainer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mpu"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6.0",
    "pyright>=1.1.380",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle, pyflakes
    "I",             # isort
    "N",             # pep8-naming
    "UP",            # pyupgrade
    "B",             # bugbear
    "SIM",           # simplify
    "RUF",           # ruff-specific
]
ignore = [
    "RUF001",  # Russian comments/strings: cyrillic letters are intentional
    "RUF002",
    "RUF003",
]

[tool.ruff.lint.isort]
known-first-party = ["mpu"]

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src"]
typeCheckingMode = "strict"
pythonVersion = "3.12"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
